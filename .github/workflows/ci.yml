name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # 带阈值门禁的覆盖率检查:thresholds 在 vitest.config.ts 声明,低于下限则失败。
      # 阈值保守(比实测低 2-3%),防倒退而非一步到位高覆盖。
      - name: Coverage gate
        run: pnpm test:coverage

      # 抓 GUI 生产构建回归(import/JSX/语法级);Tauri 原生构建仍属本地/macOS。
      - name: Build GUI
        run: pnpm --dir gui build

      # i18n 漏译检测:扫 gui/src 的 t() 调用,对比四个 locale 文件。
      # 只读(status 命令不写文件),新增漏译 key 即失败。
      # 配置见 gui/i18next.config.mjs。
      - name: i18n check
        run: pnpm --dir gui i18n:check
