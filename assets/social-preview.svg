<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="0" y="0" width="10" height="640" fill="url(#accent)"/>

  <!-- shield mark -->
  <g transform="translate(96,150)">
    <path d="M60 0 L116 22 V70 C116 116 92 150 60 168 C28 150 4 116 4 70 V22 Z" fill="none" stroke="url(#accent)" stroke-width="6"/>
    <path d="M36 84 L54 104 L88 58" fill="none" stroke="url(#accent)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="260" y="200" fill="#e6edf3" font-size="92" font-weight="800" letter-spacing="-2">skill-switch</text>
  <text x="262" y="262" fill="#8b949e" font-size="33" font-weight="500">Governance + a security gate for your AI agent skills</text>

  <!-- cross-tool line -->
  <text x="262" y="332" fill="#7d8590" font-size="27" font-weight="600" letter-spacing="1">
    Claude Code · Codex · Gemini CLI · Cursor · Copilot
  </text>

  <!-- feature chips -->
  <g font-size="26" font-weight="600">
    <g transform="translate(96,400)">
      <rect width="318" height="64" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="28" y="41" fill="#e6edf3">🛡️  Pre-install audit gate</text>
    </g>
    <g transform="translate(438,400)">
      <rect width="300" height="64" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="28" y="41" fill="#e6edf3">↩️  One-click rollback</text>
    </g>
    <g transform="translate(762,400)">
      <rect width="300" height="64" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="28" y="41" fill="#e6edf3">🔍  Drift detection</text>
    </g>
    <g transform="translate(96,484)">
      <rect width="318" height="64" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="28" y="41" fill="#e6edf3">🔒  Zero telemetry · local</text>
    </g>
    <g transform="translate(438,484)">
      <rect width="624" height="64" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="28" y="41" fill="#e6edf3">⌘  CLI + signed &amp; notarized macOS app · MIT</text>
    </g>
  </g>

  <text x="1184" y="600" text-anchor="end" fill="#484f58" font-size="22" font-weight="600">github.com/rtwsvj/skill-switch</text>
</svg>
